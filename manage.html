<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理日誌 — 投資研究日誌</title>
  <style>
    :root {
      --bg: #f4f5f7; --surface: #ffffff; --text: #1a1a2e; --muted: #6b7280;
      --border: #e5e7eb; --accent: #2563eb; --accent-soft: #dbeafe;
      --danger: #dc2626; --danger-soft: #fee2e2;
      --shadow: 0 1px 3px rgba(0,0,0,0.06); --shadow-hover: 0 8px 20px rgba(0,0,0,0.08);
      --radius: 12px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a; --surface: #1e293b; --text: #f1f5f9; --muted: #94a3b8;
        --border: #334155; --accent: #60a5fa; --accent-soft: #1e3a5f;
        --danger: #f87171; --danger-soft: #450a0a;
        --shadow: 0 1px 3px rgba(0,0,0,0.3); --shadow-hover: 0 8px 20px rgba(0,0,0,0.4);
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1.5rem 1rem; position: sticky; top: 0; z-index: 100; }
    .header-inner { max-width: 720px; margin: 0 auto; }
    .header h1 { font-size: 1.5rem; font-weight: 700; }
    .header p { color: var(--muted); font-size: 0.85rem; margin-top: 0.25rem; }
    .back-link { font-size: 0.85rem; color: var(--muted); text-decoration: none; display: inline-block; margin-bottom: 6px; }
    .back-link:hover { color: var(--accent); }
    .main { max-width: 720px; margin: 0 auto; padding: 1rem; }
    .bar { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
    .btn { padding: 8px 18px; border: none; border-radius: 8px; font-size: 0.85rem; cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .btn-accent { background: var(--accent-soft); color: var(--accent); }
    .btn-accent:hover { background: var(--accent); color: #fff; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { background: #b91c1c; }
    .btn-danger:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
    .btn-ghost { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .count { font-size: 0.8rem; color: var(--muted); }
    .card { display: flex; align-items: flex-start; gap: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; margin-bottom: 8px; box-shadow: var(--shadow); transition: all 0.15s; }
    .card.selected { border-color: var(--danger); background: var(--danger-soft); }
    .card input[type="checkbox"] { margin-top: 3px; width: 18px; height: 18px; accent-color: var(--danger); cursor: pointer; flex-shrink: 0; }
    .card .info { flex: 1; min-width: 0; }
    .card .info .title { font-size: 0.95rem; font-weight: 600; line-height: 1.4; margin-bottom: 4px; }
    .card .info .meta { display: flex; gap: 8px; align-items: center; font-size: 0.78rem; color: var(--muted); flex-wrap: wrap; }
    .id-badge { font-family: monospace; font-size: 0.72rem; background: var(--bg); padding: 1px 6px; border-radius: 4px; }
    .tag { font-size: 0.68rem; font-weight: 600; padding: 2px 8px; border-radius: 10px; }
    .tag-投資研究 { color: #059669; background: #d1fae5; }
    .tag-書籍筆記 { color: #7c3aed; background: #ede9fe; }
    .tag-總經研究 { color: #d97706; background: #fef3c7; }
    .tag-交易策略 { color: #dc2626; background: #fee2e2; }
    .tag-日誌 { color: #2563eb; background: #dbeafe; }
    @media (prefers-color-scheme: dark) {
      .tag-投資研究 { color: #34d399; background: #064e3b; }
      .tag-書籍筆記 { color: #a78bfa; background: #3b0764; }
      .tag-總經研究 { color: #fbbf24; background: #78350f; }
      .tag-交易策略 { color: #f87171; background: #7f1d1d; }
      .tag-日誌 { color: #60a5fa; background: #1e3a5f; }
    }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }
    .modal { background: var(--surface); border-radius: 16px; padding: 24px 28px; max-width: 500px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    .modal h3 { font-size: 1.1rem; margin-bottom: 10px; }
    .modal .del-list { max-height: 220px; overflow-y: auto; margin: 10px 0; font-size: 0.85rem; color: var(--muted); line-height: 1.8; }
    .modal .actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); padding: 12px 24px; border-radius: 10px; font-size: 0.88rem; box-shadow: 0 8px 24px rgba(0,0,0,0.25); z-index: 999; opacity: 0; transition: opacity 0.3s; max-width: 90%; text-align: center; }
    .toast.show { opacity: 1; }
    .cmd-box { margin-top: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; font-family: monospace; font-size: 0.82rem; word-break: break-all; user-select: all; line-height: 1.6; }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="back-link">← 回到首頁</a>
      <h1>🛠 日誌管理</h1>
      <p>勾選要刪除的文章，確認後執行指令即可同步到 GitHub Pages</p>
    </div>
  </header>

  <main class="main">
    <div class="bar">
      <button class="btn btn-accent" id="toggleAll">全選 / 取消</button>
      <button class="btn btn-danger" id="deleteBtn" disabled>刪除選取</button>
      <span class="count" id="countLabel">已選 0 筆 / 共 0 篇</span>
    </div>
    <div id="list"></div>
  </main>

  <div class="modal-overlay" id="confirmModal">
    <div class="modal">
      <h3>確認刪除</h3>
      <p>以下文章將從 articles.json 移除，對應的 HTML 檔案也會一併刪除：</p>
      <div class="del-list" id="delList"></div>
      <p style="font-size:0.82rem;color:var(--muted);margin-top:8px;">刪除後請在終端機執行以下指令推上 GitHub：</p>
      <div class="cmd-box" id="cmdBox"></div>
      <div class="actions">
        <button class="btn btn-ghost" id="cancelDel">取消</button>
        <button class="btn btn-danger" id="confirmDel">確認刪除並下載</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let articles = [];
    let selected = new Set();

    async function load() {
      const r = await fetch("articles.json");
      articles = await r.json();
      render();
    }

    function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

    function render() {
      const el = document.getElementById("list");
      el.innerHTML = articles.map(a => `
        <label class="card ${selected.has(a.id) ? "selected" : ""}">
          <input type="checkbox" data-id="${a.id}" ${selected.has(a.id) ? "checked" : ""}>
          <div class="info">
            <div class="title">${esc(a.title)}</div>
            <div class="meta">
              <span class="id-badge">${a.id}</span>
              <span>${a.date}</span>
              <span class="tag tag-${a.category}">${a.category}</span>
              <span style="font-size:0.7rem;color:var(--muted)">${esc(a.filename)}</span>
            </div>
          </div>
        </label>
      `).join("");
      updateCount();
    }

    function updateCount() {
      document.getElementById("countLabel").textContent = `已選 ${selected.size} 筆 / 共 ${articles.length} 篇`;
      const btn = document.getElementById("deleteBtn");
      btn.disabled = selected.size === 0;
      btn.textContent = selected.size > 0 ? `刪除選取的 ${selected.size} 筆` : "刪除選取";
    }

    document.getElementById("list").addEventListener("change", e => {
      if (e.target.type !== "checkbox") return;
      const id = e.target.dataset.id;
      if (e.target.checked) selected.add(id); else selected.delete(id);
      e.target.closest(".card").classList.toggle("selected", e.target.checked);
      updateCount();
    });

    document.getElementById("toggleAll").addEventListener("click", () => {
      const allSelected = selected.size === articles.length;
      selected.clear();
      if (!allSelected) articles.forEach(a => selected.add(a.id));
      render();
    });

    document.getElementById("deleteBtn").addEventListener("click", () => {
      const items = articles.filter(a => selected.has(a.id));
      document.getElementById("delList").innerHTML = items.map(a =>
        `• <strong>${a.id}</strong> — ${esc(a.title)}<br><span style="font-size:0.75rem;color:var(--muted)">  檔案: ${esc(a.filename)}</span>`
      ).join("<br>");
      const ids = items.map(a => a.id).join(" ");
      document.getElementById("cmdBox").textContent = `cd ~/Desktop/journal && ./scripts/delete.sh ${ids}`;
      document.getElementById("confirmModal").classList.add("active");
    });

    document.getElementById("cancelDel").addEventListener("click", () => {
      document.getElementById("confirmModal").classList.remove("active");
    });

    document.getElementById("confirmDel").addEventListener("click", () => {
      const toDelete = articles.filter(a => selected.has(a.id));
      const remaining = articles.filter(a => !selected.has(a.id));
      const json = JSON.stringify(remaining, null, 2);

      const blob = new Blob([json], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "articles.json";
      a.click();

      document.getElementById("confirmModal").classList.remove("active");
      const ids = toDelete.map(x => x.id).join(", ");
      selected.clear();
      articles = remaining;
      render();
      showToast(`已下載更新的 articles.json（刪除 ${ids}）。覆蓋後執行 scripts/delete.sh 或 scripts/push.sh 推上 GitHub。`);
    });

    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 10000);
    }

    load();
  </script>
</body>
</html>
